# fly.toml

app = "flowengine-samina"
primary_region = "sin"

[build]

[env]
  PORT = "8000"
  ALGORITHM = "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES = "30"
  RATE_LIMIT_PER_MINUTE = "60"
  SURGE_THRESHOLD_PER_SECOND = "10"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    soft_limit = 80
    hard_limit = 100

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  